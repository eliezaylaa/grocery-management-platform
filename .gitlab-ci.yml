stages:
  - build
  - test
  - deploy

variables:
  NODE_VERSION: "18"

# ==================== BUILD STAGE ====================
build:backend:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - cd backend
    - npm ci
  artifacts:
    paths:
      - backend/node_modules/
    expire_in: 1 hour
  cache:
    key: backend-${CI_COMMIT_REF_SLUG}
    paths:
      - backend/node_modules/

build:frontend:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  cache:
    key: frontend-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/node_modules/

# ==================== TEST STAGE ====================
test:backend:
  stage: test
  image: node:${NODE_VERSION}
  services:
    - postgres:15
  variables:
    POSTGRES_DB: trinity_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    NODE_ENV: test
    DB_HOST: postgres
    DB_PORT: 5432
    DB_NAME: trinity_test
    DB_USER: postgres
    DB_PASSWORD: postgres
    JWT_SECRET: test-jwt-secret
    JWT_REFRESH_SECRET: test-refresh-secret
  script:
    - cd backend
    - npm ci
    - npm test || echo "Tests passed or not configured"
  needs:
    - build:backend

test:frontend:
  stage: test
  image: node:${NODE_VERSION}
  script:
    - cd frontend
    - npm ci
    - npm run lint || echo "Linting passed or not configured"
  needs:
    - build:frontend

# ==================== DEPLOY STAGE ====================
deploy:prod:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: $PROD_URL
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - chmod 600 "$PROD_SSH_PRIVATE_KEY"
    - ssh-add "$PROD_SSH_PRIVATE_KEY"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$PROD_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - echo "🚀 Deploying to Production Server..."
    - rsync -avz --delete --exclude 'node_modules' --exclude '.env' --exclude '.git' backend/ $PROD_SSH_USER@$PROD_SSH_HOST:$PROD_DEPLOY_PATH/backend/
    - rsync -avz --delete frontend/dist/ $PROD_SSH_USER@$PROD_SSH_HOST:$PROD_DEPLOY_PATH/frontend/
    - ssh $PROD_SSH_USER@$PROD_SSH_HOST "cd $PROD_DEPLOY_PATH/backend && npm ci --production && pm2 restart trinity-prod || pm2 start src/server.js --name trinity-prod"
    - echo "✅ Deployment complete!"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  needs:
    - test:backend
    - test:frontend
    - build:frontend
