stages:
  - build
  - test

variables:
  NODE_VERSION: "18"

# ==================== BUILD STAGE ====================
build:backend:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - cd backend
    - npm ci
  cache:
    key: backend-${CI_COMMIT_REF_SLUG}
    paths:
      - backend/node_modules/

build:frontend:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 day
  cache:
    key: frontend-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/node_modules/

# ==================== TEST STAGE ====================
test:backend:
  stage: test
  image: node:${NODE_VERSION}
  services:
    - postgres:15
  variables:
    POSTGRES_DB: trinity_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    NODE_ENV: test
    DB_HOST: postgres
    DB_PORT: 5432
    DB_NAME: trinity_test
    DB_USER: postgres
    DB_PASSWORD: postgres
    JWT_SECRET: test-jwt-secret
    JWT_REFRESH_SECRET: test-refresh-secret
  script:
    - cd backend
    - npm ci
    - echo "Backend build successful"

test:frontend:
  stage: test
  image: node:${NODE_VERSION}
  script:
    - cd frontend
    - npm ci
    - echo "Frontend build successful"
