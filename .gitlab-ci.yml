stages:
  - build
  - test
  - deploy

variables:
  NODE_VERSION: "18"
  POSTGRES_DB: trinity_test_db
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_HOST: postgres

.node_template: &node_template
  image: node:${NODE_VERSION}
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - backend/node_modules/
      - frontend/node_modules/

# BUILD - DEV
build:backend:dev:
  <<: *node_template
  stage: build
  script:
    - cd backend
    - npm ci
  artifacts:
    paths:
      - backend/node_modules/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

build:frontend:dev:
  <<: *node_template
  stage: build
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/node_modules/
      - frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

# BUILD - PROD
build:backend:prod:
  <<: *node_template
  stage: build
  script:
    - cd backend
    - npm ci --production
  artifacts:
    paths:
      - backend/node_modules/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build:frontend:prod:
  <<: *node_template
  stage: build
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# TEST - DEV
test:backend:dev:
  <<: *node_template
  stage: test
  services:
    - postgres:15
  variables:
    NODE_ENV: test
    DB_HOST: postgres
    DB_PORT: 5432
    DB_NAME: $POSTGRES_DB
    DB_USER: $POSTGRES_USER
    DB_PASSWORD: $POSTGRES_PASSWORD
    JWT_SECRET: test-secret-key
    JWT_REFRESH_SECRET: test-refresh-secret-key
  script:
    - cd backend
    - npm ci
    - npm test
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  needs:
    - build:backend:dev

test:frontend:dev:
  <<: *node_template
  stage: test
  script:
    - cd frontend
    - npm ci
    - npm run lint || true
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  needs:
    - build:frontend:dev

# TEST - PROD
test:backend:prod:
  <<: *node_template
  stage: test
  services:
    - postgres:15
  variables:
    NODE_ENV: test
    DB_HOST: postgres
    DB_PORT: 5432
    DB_NAME: $POSTGRES_DB
    DB_USER: $POSTGRES_USER
    DB_PASSWORD: $POSTGRES_PASSWORD
    JWT_SECRET: test-secret-key
    JWT_REFRESH_SECRET: test-refresh-secret-key
  script:
    - cd backend
    - npm ci
    - npm test
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  needs:
    - build:backend:prod

test:frontend:prod:
  <<: *node_template
  stage: test
  script:
    - cd frontend
    - npm ci
    - npm run lint || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  needs:
    - build:frontend:prod

# DEPLOY - DEV
deploy:dev:
  stage: deploy
  image: alpine:latest
  environment:
    name: development
    url: $DEV_URL
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$DEV_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$DEV_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to development server..."
    - rsync -avz --delete --exclude 'node_modules' --exclude '.git' --exclude '.env' backend/ $DEV_SSH_USER@$DEV_SSH_HOST:$DEV_DEPLOY_PATH/backend/
    - rsync -avz --delete frontend/dist/ $DEV_SSH_USER@$DEV_SSH_HOST:$DEV_DEPLOY_PATH/frontend/
    - ssh $DEV_SSH_USER@$DEV_SSH_HOST "cd $DEV_DEPLOY_PATH/backend && npm ci --production && pm2 restart trinity-api-dev || pm2 start src/server.js --name trinity-api-dev"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual
  needs:
    - test:backend:dev
    - test:frontend:dev

# DEPLOY - PROD
deploy:prod:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: $PROD_URL
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$PROD_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$PROD_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to production server..."
    - rsync -avz --delete --exclude 'node_modules' --exclude '.git' --exclude '.env' backend/ $PROD_SSH_USER@$PROD_SSH_HOST:$PROD_DEPLOY_PATH/backend/
    - rsync -avz --delete frontend/dist/ $PROD_SSH_USER@$PROD_SSH_HOST:$PROD_DEPLOY_PATH/frontend/
    - ssh $PROD_SSH_USER@$PROD_SSH_HOST "cd $PROD_DEPLOY_PATH/backend && npm ci --production && pm2 restart trinity-api-prod || pm2 start src/server.js --name trinity-api-prod"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_TAG
      when: manual
  needs:
    - test:backend:prod
    - test:frontend:prod
